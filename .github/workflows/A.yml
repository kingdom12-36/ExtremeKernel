name: ExtremeKernel d2s Build (all managers)

on:
  push:
  workflow_dispatch:

jobs:
  build_d2s:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manager: [ksun, ksu, sukisu]
        include:
          - manager: ksun
            submodule: KernelSU-Next
            version_base: 30000
            version_offset: 150
          - manager: ksu
            submodule: KernelSU
            version_base: 10200
            version_offset: 200
          - manager: sukisu
            submodule: SukiSU
            version_base: 30000
            version_offset: 200

    name: Build (${{ matrix.manager }})

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ github.token }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libxml2-utils xsltproc unzip fontconfig

      - name: Cache Neutron Clang 18 toolchain
        uses: actions/cache@v4
        with:
          path: |
            toolchain/neutron_18
            ~/.neutron-tc
          key: neutron-clang-18-05012024-v3

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-d2s-${{ matrix.manager }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-d2s-${{ matrix.manager }}-${{ github.ref_name }}-
            ccache-d2s-${{ matrix.manager }}-

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Setup Neutron Clang 18 toolchain
        run: |
          CLANG_DIR=toolchain/neutron_18
          if [ ! -f "$CLANG_DIR/bin/clang-18" ]; then
            echo "Downloading Neutron Clang 18..."
            rm -rf "$CLANG_DIR"
            mkdir -p "$CLANG_DIR"
            pushd "$CLANG_DIR"
            bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") -S=05012024
            bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") --patch=glibc
            popd
          else
            echo "Toolchain restored from cache."
          fi
          if [ ! -e "$CLANG_DIR/bin/clang" ] && [ -f "$CLANG_DIR/bin/clang-18" ]; then
            ln -sf clang-18 "$CLANG_DIR/bin/clang"
          fi
          echo "Toolchain: $($CLANG_DIR/bin/clang-18 --version 2>&1 | head -1)"

      - name: Sync manager submodule
        run: |
          git submodule sync "${{ matrix.submodule }}"
          git submodule update --init --force --no-recommend-shallow "${{ matrix.submodule }}"
          git -C "${{ matrix.submodule }}" fetch --unshallow origin 2>/dev/null || true

      # ── Scan: report issues (never blocks — patch step fixes everything) ─────
      - name: Fast scan - kernel API compatibility
        run: |
          echo "=================================================================="
          echo " PRE-BUILD SCAN — ${{ matrix.manager }} | $(date -u)"
          echo "=================================================================="
          ERRORS=0; WARNS=0

          SCAN_DIR="${{ matrix.submodule }}/kernel"
          if [ ! -d "$SCAN_DIR" ]; then
            echo "  Submodule dir not found: $SCAN_DIR — skipping scan"
          else
            echo "Scanning: $SCAN_DIR"

            e=$(grep -rn -E "\b__poll_t\b"                                     "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$e" ] && { echo "  ERROR __poll_t (kernel<4.16):";         echo "$e"|head -5|sed 's/^/    /'; ERRORS=$((ERRORS+1)); } || echo "  OK  __poll_t"

            e=$(grep -rn -E "\bEPOLLIN\b|\bEPOLLHUP\b|\bEPOLLRDNORM\b|\bEPOLLOUT\b|\bEPOLLERR\b" "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$e" ] && { echo "  ERROR EPOLL* (kernel<4.16):";           echo "$e"|head -5|sed 's/^/    /'; ERRORS=$((ERRORS+1)); } || echo "  OK  EPOLL*"

            e=$(grep -rn -E "\bkvmalloc_array\b"                               "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$e" ] && { echo "  ERROR kvmalloc_array (kernel<4.12):";   echo "$e"|head -5|sed 's/^/    /'; ERRORS=$((ERRORS+1)); } || echo "  OK  kvmalloc_array"

            e=$(grep -rn -E "\bkvcalloc\b"                                     "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$e" ] && { echo "  ERROR kvcalloc (kernel<4.15):";         echo "$e"|head -5|sed 's/^/    /'; ERRORS=$((ERRORS+1)); } || echo "  OK  kvcalloc"

            w=$(grep -rn -E "\bstrncpy_from_user\b"                             "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$w" ] && { echo "  WARN strncpy_from_user"; WARNS=$((WARNS+1)); } || echo "  OK  strncpy_from_user"

            w=$(grep -rn -E "\b__pte_to_phys\b"                                 "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$w" ] && { echo "  WARN __pte_to_phys"; WARNS=$((WARNS+1)); } || echo "  OK  __pte_to_phys"

            w=$(grep -rn -E "\bselinux_inode\b"                                 "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$w" ] && { echo "  WARN selinux_inode (added kernel 5.1)"; WARNS=$((WARNS+1)); } || echo "  OK  selinux_inode"

            w=$(grep -rn -E "\bset_fs\b|\bget_fs\b"                             "$SCAN_DIR" 2>/dev/null || true)
            [ -n "$w" ] && { echo "  WARN set_fs/get_fs (removed 5.10+)"; WARNS=$((WARNS+1)); } || echo "  OK  set_fs/get_fs"
          fi

          echo ""
          echo " SCAN RESULT [${{ matrix.manager }}]: $ERRORS error(s)  $WARNS warning(s)"
          echo " → Auto-patch will fix these before compile"
          echo "=================================================================="

          [ "$ERRORS" -gt 0 ] && echo "::warning::[${{ matrix.manager }}] $ERRORS issue(s) found — auto-patching now"
          [ "$WARNS"  -gt 0 ] && echo "::warning::[${{ matrix.manager }}] $WARNS warning(s) — auto-patching now"
          true  # never block — patch step handles everything

      # ── Auto-patch ALL managers — kernel 4.14 compat ─────────────────────────
      - name: Apply kernel 4.14 compat patches
        run: |
          echo "=================================================================="
          echo " PATCHING [${{ matrix.manager }}] | $(date -u)"
          echo "=================================================================="
          PATCHED=0

          # Build list of directories to patch
          DIRS=()
          [ -d "${{ matrix.submodule }}/kernel" ] && DIRS+=("${{ matrix.submodule }}/kernel")
          [ -d "drivers/kernelsu"               ] && DIRS+=("drivers/kernelsu")

          if [ ${#DIRS[@]} -eq 0 ]; then
            echo "  No patchable directories found yet — will retry after build setup"
            exit 0
          fi

          for SEARCH_DIR in "${DIRS[@]}"; do
            echo "Patching directory: $SEARCH_DIR"
            while IFS= read -r f; do

              CHANGED=0
              BEFORE=$(md5sum "$f" 2>/dev/null || echo "new")

              # FIX: __poll_t → unsigned int  (type added in kernel 4.16)
              if grep -qE "\b__poll_t\b" "$f" 2>/dev/null; then
                sed -i -E 's/\b__poll_t\b/unsigned int/g' "$f"
                echo "  [__poll_t] $f"
                CHANGED=1
              fi

              # FIX: EPOLL* → POLL*  (EPOLL_ prefixes added in kernel 4.16)
              if grep -qE "\bEPOLLIN\b|\bEPOLLHUP\b|\bEPOLLRDNORM\b|\bEPOLLOUT\b|\bEPOLLERR\b|\bEPOLLPRI\b|\bEPOLLWRNORM\b|\bEPOLLWRBAND\b|\bEPOLLRDBAND\b" "$f" 2>/dev/null; then
                sed -i -E 's/\bEPOLLHUP\b/POLLHUP/g'       "$f"
                sed -i -E 's/\bEPOLLIN\b/POLLIN/g'          "$f"
                sed -i -E 's/\bEPOLLRDNORM\b/POLLRDNORM/g'  "$f"
                sed -i -E 's/\bEPOLLOUT\b/POLLOUT/g'        "$f"
                sed -i -E 's/\bEPOLLERR\b/POLLERR/g'        "$f"
                sed -i -E 's/\bEPOLLPRI\b/POLLPRI/g'        "$f"
                sed -i -E 's/\bEPOLLWRNORM\b/POLLWRNORM/g'  "$f"
                sed -i -E 's/\bEPOLLWRBAND\b/POLLWRBAND/g'  "$f"
                sed -i -E 's/\bEPOLLRDBAND\b/POLLRDBAND/g'  "$f"
                echo "  [EPOLL*] $f"
                CHANGED=1
              fi

              # FIX: kvcalloc → kcalloc  (kvcalloc added in kernel 4.15)
              if grep -qE "\bkvcalloc\b" "$f" 2>/dev/null; then
                sed -i -E 's/\bkvcalloc\b/kcalloc/g' "$f"
                echo "  [kvcalloc] $f"
                CHANGED=1
              fi

              # FIX: kvmalloc_array → kmalloc_array  (kvmalloc_array added in kernel 4.12)
              if grep -qE "\bkvmalloc_array\b" "$f" 2>/dev/null; then
                sed -i -E 's/\bkvmalloc_array\b/kmalloc_array/g' "$f"
                echo "  [kvmalloc_array] $f"
                CHANGED=1
              fi

              # FIX: kvmalloc → kmalloc  (kvmalloc added in kernel 4.12)
              if grep -qE "\bkvmalloc\b" "$f" 2>/dev/null; then
                sed -i -E 's/\bkvmalloc\b/kmalloc/g' "$f"
                echo "  [kvmalloc] $f"
                CHANGED=1
              fi

              # FIX: kvfree → kfree  (kvfree added in kernel 4.12)
              if grep -qE "\bkvfree\b" "$f" 2>/dev/null; then
                sed -i -E 's/\bkvfree\b/kfree/g' "$f"
                echo "  [kvfree] $f"
                CHANGED=1
              fi

              # FIX: strncpy_from_user — add missing <linux/uaccess.h>
              if grep -q "strncpy_from_user" "$f" 2>/dev/null && \
                 ! grep -q "#include <linux/uaccess.h>" "$f" 2>/dev/null; then
                sed -i '1s|^|#include <linux/uaccess.h>\n|' "$f"
                echo "  [uaccess.h] $f"
                CHANGED=1
              fi

              # FIX: __pte_to_phys — add missing <asm/pgtable.h>
              if grep -q "__pte_to_phys" "$f" 2>/dev/null && \
                 ! grep -qE "#include.*pgtable" "$f" 2>/dev/null; then
                sed -i '1s|^|#include <asm/pgtable.h>\n|' "$f"
                echo "  [pgtable.h] $f"
                CHANGED=1
              fi

              # FIX: selinux_inode() — compat cast for kernel < 5.1
              if grep -q "selinux_inode(" "$f" 2>/dev/null; then
                sed -i -E \
                  's/selinux_inode\(([^)]+)\)/(struct inode_security_struct *)(\1)->i_security/g' \
                  "$f"
                echo "  [selinux_inode] $f"
                CHANGED=1
              fi

              AFTER=$(md5sum "$f" 2>/dev/null || echo "changed")
              [ "$CHANGED" -eq 1 ] && [ "$BEFORE" != "$AFTER" ] && PATCHED=$((PATCHED+1))

            done < <(find "$SEARCH_DIR" \( -name "*.c" -o -name "*.h" \) 2>/dev/null)
          done

          echo ""
          echo "Files modified: $PATCHED"

          # Verify — critical errors must be gone
          REMAINING=""
          for SEARCH_DIR in "${DIRS[@]}"; do
            R=$(grep -rn -E "\b__poll_t\b|\bEPOLLIN\b|\bEPOLLHUP\b|\bEPOLLRDNORM\b|\bkvcalloc\b|\bkvmalloc_array\b" \
                  "$SEARCH_DIR" 2>/dev/null || true)
            REMAINING="$REMAINING$R"
          done

          if [ -n "$REMAINING" ]; then
            echo "::error::Verification failed — symbols still present after patching:"
            echo "$REMAINING"
            exit 1
          fi
          echo "Verification passed — all kernel 4.14 incompatibilities resolved."
          echo "=================================================================="

      - name: Generate random KPatch superkey
        run: echo "KPATCH_SUPERKEY=$(openssl rand -hex 16)" >> $GITHUB_ENV

      - name: Kernel + manager fingerprint
        run: |
          echo "KERNEL_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV
          cd "${{ matrix.submodule }}"
          KSU_COMMIT=$(git rev-parse HEAD)
          COUNT=$(git rev-list --count HEAD)
          VERSION=$(( ${{ matrix.version_base }} + COUNT + ${{ matrix.version_offset }} ))
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
          echo "KSU_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Manager: ${{ matrix.manager }} | commit: $KSU_COMMIT | version: $VERSION"

      - name: Show fingerprint summary
        run: |
          echo "===================="
          echo "Manager:         ${{ matrix.manager }}"
          echo "Kernel commit:   $KERNEL_COMMIT"
          echo "Manager commit:  $KSU_COMMIT"
          echo "Manager version: $KSU_VERSION"
          echo "KPatch superkey: $KPATCH_SUPERKEY"
          echo "===================="

      - name: Build d2s kernel
        env:
          USE_CCACHE: "1"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: "5G"
          CCACHE_COMPRESS: "1"
        run: |
          chmod +x ./workflows.sh
          ./workflows.sh -m d2s -k y -r N -M ${{ matrix.manager }}

      - name: Setup KPatch-Next tools
        run: |
          KPATCH_VER=$(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "KPATCH_VER=$KPATCH_VER" >> $GITHUB_ENV
          curl -Lo kptools        https://github.com/KernelSU-Next/KPatch-Next/releases/download/${KPATCH_VER}/kptools-linux
          curl -Lo kpimg          https://github.com/KernelSU-Next/KPatch-Next/releases/download/${KPATCH_VER}/kpimg-linux
          curl -Lo kpatch-android https://github.com/KernelSU-Next/KPatch-Next/releases/download/${KPATCH_VER}/kpatch-android
          chmod +x kptools kpimg kpatch-android
          ./kptools --version || true

      - name: Patch kernel with KPatch-Next
        run: |
          IMAGE=build/out/d2s/Image
          PATCHED_IMAGE=build/out/d2s/Image.kp
          ./kptools -i "$IMAGE" -l || true
          ./kptools -p -i "$IMAGE" -k ./kpimg -s "$KPATCH_SUPERKEY" -o "$PATCHED_IMAGE"
          mkdir -p build/out/d2s-kpatch/zip/files
          mkdir -p build/out/d2s-kpatch/zip/META-INF/com/google/android
          cp build/out/d2s/dtb.img  build/out/d2s-kpatch/zip/files/dtb.img
          cp build/out/d2s/dtbo.img build/out/d2s-kpatch/zip/files/dtbo.img
          cp build/update-binary    build/out/d2s-kpatch/zip/META-INF/com/google/android/update-binary
          cp build/updater-script   build/out/d2s-kpatch/zip/META-INF/com/google/android/updater-script
          cp kpatch-android         build/out/d2s-kpatch/zip/files/kpatch-android
          ./toolchain/mkbootimg \
            --base 0x10000000 \
            --board SRPSC14B009KU \
            --cmdline 'loop.max_part=7' \
            --hashtype sha1 \
            --header_version 1 \
            --kernel "$PATCHED_IMAGE" \
            --kernel_offset 0x00008000 \
            --os_patch_level 2025-01 \
            --os_version 14.0.0 \
            --pagesize 2048 \
            --ramdisk build/out/d2s/ramdisk.cpio.gz \
            --ramdisk_offset 0xF0000000 \
            --second_offset 0xF0000000 \
            --tags_offset 0x00000100 \
            -o build/out/d2s-kpatch/zip/files/boot.img

      - name: Save build metadata
        run: |
          mkdir -p build/out/meta
          {
            echo "Manager:         ${{ matrix.manager }}"
            echo "Kernel Commit:   $KERNEL_COMMIT"
            echo "Manager Commit:  $KSU_COMMIT"
            echo "Manager Version: $KSU_VERSION"
            echo "KPatch-Next:     $KPATCH_VER"
            echo "KPatch Superkey: $KPATCH_SUPERKEY"
          } > build/out/meta/build-info.txt
          cat build/out/meta/build-info.txt

      - name: Inject metadata into artifacts
        run: |
          cp build/out/meta/build-info.txt build/out/d2s/zip/
          cp build/out/meta/build-info.txt build/out/d2s-kpatch/zip/

      - name: Upload standard kernel
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-d2s-${{ matrix.manager }}-KSU${{ env.KSU_VERSION }}
          path: build/out/d2s/zip

      - name: Upload KPatch kernel
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-d2s-${{ matrix.manager }}-KPatch-KSU${{ env.KSU_VERSION }}
          path: build/out/d2s-kpatch/zip
