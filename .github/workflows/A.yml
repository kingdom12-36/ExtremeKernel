name: ExtremeKernel d2s Build (stable + correct fingerprint)

on:
  push:
  workflow_dispatch:

jobs:
  build_d2s:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ github.token }}

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libxml2-utils xsltproc unzip fontconfig

      - name: Sync submodules (deterministic)
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Kernel fingerprint (stable)
        run: |
          echo "KERNEL_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: KernelSU fingerprint + version
        run: |
          cd KernelSU-Next
          echo "KSU_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

          COUNT=$(git rev-list --count HEAD)
          VERSION=$((30000 + COUNT + 150))

          echo "KSU_VERSION=$VERSION" >> $GITHUB_ENV

          echo "KernelSU commit: $(git rev-parse HEAD)"
          echo "KernelSU version: $VERSION"

          cd ..

      - name: Show fingerprint summary
        run: |
          echo "===================="
          echo "Kernel commit: $KERNEL_COMMIT"
          echo "KernelSU commit: $KSU_COMMIT"
          echo "KernelSU version: $KSU_VERSION"
          echo "===================="

      # ── Variant 1: Standard (KernelSU, no KPatch) ──────────────────────────
      - name: Build d2s kernel
        run: |
          chmod +x ./workflows.sh
          ./workflows.sh -m d2s -k Y -r N

      # ── KPatch tooling (downloaded once, reused for all KPatch variants) ───
      - name: Setup KPatch-Next tools
        run: |
          KPATCH_VER=$(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          echo "KPatch version: $KPATCH_VER"

          curl -Lo kptools https://github.com/KernelSU-Next/KPatch-Next/releases/download/${KPATCH_VER}/kptools-linux
          curl -Lo kpimg   https://github.com/KernelSU-Next/KPatch-Next/releases/download/${KPATCH_VER}/kpimg-linux

          chmod +x kptools kpimg
          ./kptools --version || true

      # ── Variant 2: KPatch (KernelSU + KPatch-Next) ─────────────────────────
      - name: Patch kernel with KPatch-Next
        run: |
          IMAGE=build/out/d2s/Image
          PATCHED_IMAGE=build/out/d2s/Image.kp

          ./kptools -i "$IMAGE" -l || true
          ./kptools -p -i "$IMAGE" -k ./kpimg -o "$PATCHED_IMAGE"

          mkdir -p build/out/d2s-kpatch/zip/files
          mkdir -p build/out/d2s-kpatch/zip/META-INF/com/google/android

          cp build/out/d2s/dtb.img build/out/d2s-kpatch/zip/files/dtb.img
          cp build/out/d2s/dtbo.img build/out/d2s-kpatch/zip/files/dtbo.img
          cp build/update-binary build/out/d2s-kpatch/zip/META-INF/com/google/android/update-binary
          cp build/updater-script build/out/d2s-kpatch/zip/META-INF/com/google/android/updater-script

          ./toolchain/mkbootimg \
            --base 0x10000000 \
            --board SRPSC14B009KU \
            --cmdline 'loop.max_part=7' \
            --hashtype sha1 \
            --header_version 1 \
            --kernel "$PATCHED_IMAGE" \
            --kernel_offset 0x00008000 \
            --os_patch_level 2025-01 \
            --os_version 14.0.0 \
            --pagesize 2048 \
            --ramdisk build/out/d2s/ramdisk.cpio.gz \
            --ramdisk_offset 0xF0000000 \
            --second_offset 0xF0000000 \
            --tags_offset 0x00000100 \
            -o build/out/d2s-kpatch/zip/files/boot.img

      # ── Variant 3: KPatch + WiFi Monitor Mode ──────────────────────────────
      # Builds the kernel a second time with -n Y (monitor.config + WL_MONITOR),
      # then KPatches the result. Output goes to build/out/d2s-monitor/ and
      # build/out/d2s-kpatch-monitor/ — never overwrites Variant 1/2 artifacts.
      - name: Build d2s monitor kernel (WL_MONITOR + monitor.config)
        run: |
          ./workflows.sh -m d2s -k Y -r N -n Y

      - name: Patch monitor kernel with KPatch-Next + assemble zip
        run: |
          IMAGE=build/out/d2s-monitor/Image
          PATCHED_IMAGE=build/out/d2s-monitor/Image.kp

          ./kptools -i "$IMAGE" -l || true
          ./kptools -p -i "$IMAGE" -k ./kpimg -o "$PATCHED_IMAGE"

          mkdir -p build/out/d2s-kpatch-monitor/zip/files
          mkdir -p build/out/d2s-kpatch-monitor/zip/META-INF/com/google/android

          # DTB/DTBO from the monitor build
          cp build/out/d2s-monitor/dtb.img  build/out/d2s-kpatch-monitor/zip/files/dtb.img
          cp build/out/d2s-monitor/dtbo.img build/out/d2s-kpatch-monitor/zip/files/dtbo.img

          # Attack detector script — installed automatically by updater-script-monitor
          cp build/service.d/wifi_monitor_attacks.sh \
             build/out/d2s-kpatch-monitor/zip/files/wifi_monitor_attacks.sh

          # Monitor-aware updater-script installs the service.d script on flash
          cp build/update-binary \
             build/out/d2s-kpatch-monitor/zip/META-INF/com/google/android/update-binary
          cp build/updater-script-monitor \
             build/out/d2s-kpatch-monitor/zip/META-INF/com/google/android/updater-script

          # KPatched boot image from the monitor kernel
          ./toolchain/mkbootimg \
            --base 0x10000000 \
            --board SRPSC14B009KU \
            --cmdline 'loop.max_part=7' \
            --hashtype sha1 \
            --header_version 1 \
            --kernel "$PATCHED_IMAGE" \
            --kernel_offset 0x00008000 \
            --os_patch_level 2025-01 \
            --os_version 14.0.0 \
            --pagesize 2048 \
            --ramdisk build/out/d2s-monitor/ramdisk.cpio.gz \
            --ramdisk_offset 0xF0000000 \
            --second_offset 0xF0000000 \
            --tags_offset 0x00000100 \
            -o build/out/d2s-kpatch-monitor/zip/files/boot.img

      # ── Metadata ────────────────────────────────────────────────────────────
      - name: Save build metadata
        run: |
          mkdir -p build/out/meta
          echo "Kernel Commit: $KERNEL_COMMIT" > build/out/meta/build-info.txt
          echo "KernelSU Commit: $KSU_COMMIT" >> build/out/meta/build-info.txt
          echo "KernelSU Version: $KSU_VERSION" >> build/out/meta/build-info.txt

      - name: Inject metadata into artifacts
        run: |
          cp build/out/meta/build-info.txt build/out/d2s/zip/
          cp build/out/meta/build-info.txt build/out/d2s-kpatch/zip/
          cp build/out/meta/build-info.txt build/out/d2s-kpatch-monitor/zip/

      # ── Upload all three variants ────────────────────────────────────────────
      - name: Upload standard kernel
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-d2s-KSU${{ env.KSU_VERSION }}
          path: build/out/d2s/zip

      - name: Upload KPatch kernel
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-d2s-KPatch-KSU${{ env.KSU_VERSION }}
          path: build/out/d2s-kpatch/zip

      - name: Upload KPatch+Monitor kernel
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKRNL-Nexus-d2s-KPatch-Monitor-KSU${{ env.KSU_VERSION }}
          path: build/out/d2s-kpatch-monitor/zip
