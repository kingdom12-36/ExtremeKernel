name: Build KPM Modules

on:
  push:
    paths:
      - kpms/**
      - .github/workflows/build-kpm.yml
      - kpatch-version
  workflow_dispatch:

jobs:
  build-kpm:
    name: Build KPM Modules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned KPatch-Next version
        id: kpver
        run: |
          VER=$(cat kpatch-version | tr -d '[:space:]')
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Building against pinned KPatch-Next version: $VER"

      - name: Download ARM64 cross-compiler
        run: |
          curl -Lo toolchain.tar.xz https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -Jxf toolchain.tar.xz

      - name: Clone KPatch-Next (pinned version)
        run: |
          git clone --depth=1 --branch ${{ steps.kpver.outputs.version }} https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next

      - name: Generate KPatch headers
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          cd kpatch-next/kernel
          make hdr

      # ============= BUILD extreme-tweaker =============
      - name: Build extreme-tweaker.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          export CFLAGS="-Wall -O2 -mgeneral-regs-only -fno-pic -fno-pie -mcmodel=large -D__KERNEL__"
          cd kpms/extreme-tweaker
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR" CFLAGS="$CFLAGS"
          ls -lh extreme-tweaker.kpm
          file extreme-tweaker.kpm

      # ============= BUILD battery-saver =============
      - name: Build battery-saver.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          export CFLAGS="-Wall -O2 -mgeneral-regs-only -fno-pic -fno-pie -mcmodel=large -D__KERNEL__"
          cd kpms/battery-saver
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR" CFLAGS="$CFLAGS"
          ls -lh battery-saver.kpm
          file battery-saver.kpm

      # ============= BUILD disabler (جديد) =============
      - name: Build disabler.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          export CFLAGS="-Wall -O2 -mgeneral-regs-only -fno-pic -fno-pie -mcmodel=large -D__KERNEL__"
          cd kpms/disabler
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR" CFLAGS="$CFLAGS"
          ls -lh disabler.kpm
          file disabler.kpm

      # ============= رفع جميع الملفات كـ artifacts =============
      - name: Upload all KPMs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-KPMs
          path: |
            kpms/extreme-tweaker/extreme-tweaker.kpm
            kpms/battery-saver/battery-saver.kpm
            kpms/disabler/disabler.kpm
          if-no-files-found: error

      # ============= إنشاء GitHub Release =============
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: kpm-v${{ github.run_number }}
          name: "ExtremeKernel KPMs (build ${{ github.run_number }})"
          artifacts: |
            kpms/extreme-tweaker/extreme-tweaker.kpm
            kpms/battery-saver/battery-saver.kpm
            kpms/disabler/disabler.kpm
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ## ExtremeKernel KPM Modules

            Built against KPatch-Next **${{ steps.kpver.outputs.version }}** (pinned in `kpatch-version`).
            Target: **Samsung Galaxy S20 Ultra (d2s, Exynos 9825, kernel 4.14)**

            ---

            ### extreme-tweaker.kpm — Performance Tweaker **v2.0**
            - battery-focused tuning
            - full restore on unload
            - vm.swappiness → 10, dirty_ratio → 20
            - tcp_fastopen → 3, tcp_slow_start → 0

            ### battery-saver.kpm — Battery Saver **v2.3** (final)
            - Reduces CPU/disk wake-ups
            - Fixed: removed dead TCP symbols (not in Samsung 4.14 kernel)
            - Does NOT touch charging, voltage, or thermals

            ### disabler.kpm — Kernel Debug Disabler **v1.0** (NEW)
            - Runtime kernel debug disabler
            - X-macro driven implementation
            - Disables unnecessary debug features for better performance

            ---

            ### How to install
            1. Flash **ExtremeKRNL-Nexus-d2s-KPatch** zip via TWRP/OrangeFox
            2. In KernelSU Manager → install **KPatch-Next-Module**
            3. Open KPatch-Next-Module → WebUI → **KPM** tab → **Load**
            4. Load one or more .kpm files
