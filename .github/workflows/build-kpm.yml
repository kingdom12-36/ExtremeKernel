Name: Build KPM Modules

on:
  push:
    paths:
      - kpms/**
      - .github/workflows/build-kpm.yml
  workflow_dispatch:

jobs:
  build-kpm:
    name: Build KPM Modules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest KPatch-Next version (Strict Matching)
        id: kpver
        run: |
          VER=$(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Using KPatch-Next Stable Version: $VER"

      - name: Download ARM64 cross-compiler
        run: |
          curl -Lo toolchain.tar.xz https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -Jxf toolchain.tar.xz

      - name: Clone KPatch-Next (Exact Tag Matching)
        run: |
          # نقوم بجلب التاج المستقر المطابق تماماً لما تم حقنه في الكيرنل لمنع الـ Mismatch
          git clone --depth=1 --branch ${{ steps.kpver.outputs.version }} https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next

      - name: Build KPatch Kernel Tools (Generate proper CFLAGS & Headers)
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          cd kpatch-next/kernel
          make hdr
          make
          echo "KPatch Base Environment Ready."

      - name: Build extreme-tweaker.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          
          # حقن الـ Flags لضمان معمارية الـ Kernel الموجهة للهاتف ومنع الـ PIE والـ Floats
          export CFLAGS="-Wall -O2 -mgeneral-regs-only -fno-pic -fno-pie -mcmodel=large -D__KERNEL__"
          
          cd kpms/extreme-tweaker
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR" CFLAGS="$CFLAGS"
          ls -lh extreme-tweaker.kpm
          file extreme-tweaker.kpm

      - name: Build battery-saver.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          
          # تمرير نفس الرايات الصارمة للموديول الثاني
          export CFLAGS="-Wall -O2 -mgeneral-regs-only -fno-pic -fno-pie -mcmodel=large -D__KERNEL__"
          
          cd kpms/battery-saver
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR" CFLAGS="$CFLAGS"
          ls -lh battery-saver.kpm
          file battery-saver.kpm

      - name: Upload both KPMs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExtremeKernel-KPMs
          path: |
            kpms/extreme-tweaker/extreme-tweaker.kpm
            kpms/battery-saver/battery-saver.kpm
          if-no-files-found: error

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: kpm-v${{ github.run_number }}
          name: "ExtremeKernel KPMs (build ${{ github.run_number }})"
          artifacts: |
            kpms/extreme-tweaker/extreme-tweaker.kpm
            kpms/battery-saver/battery-saver.kpm
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ## ExtremeKernel KPM Modules

            Built against KPatch-Next ${{ steps.kpver.outputs.version }}.
            Target: **Samsung Galaxy S20 Ultra (d2s, Exynos 9825, kernel 4.14)**

            ---

            ### extreme-tweaker.kpm — Performance Tweaker v1.1
            Fixes vs v1.0: correct symbol names for Samsung 4.14, dirty_bytes zeroed so dirty_ratio takes effect.

            ### battery-saver.kpm — Battery Saver v1.0
            Reduces CPU + disk wake-ups. Does NOT touch charging, voltage, or thermals.

            ---

            ### How to install
            1. Flash **ExtremeKRNL-Nexus-d2s-KPatch** zip via TWRP/OrangeFox
            2. In KernelSU Manager → install **KPatch-Next-Module**
            3. Open KPatch-Next-Module → WebUI → **KPM** tab → **Load**
            4. Load one or both .kpm files
