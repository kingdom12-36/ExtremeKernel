name: Build KPM Modules

on:
  push:
    paths:
      - kpms/**
      - .github/workflows/build-kpm.yml
  workflow_dispatch:

jobs:
  build-kpm:
    name: Build extreme-tweaker.kpm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest KPatch-Next version
        id: kpver
        run: |
          VER=$(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "KPatch-Next $VER"

      - name: Download ARM64 cross-compiler
        run: |
          curl -Lo toolchain.tar.xz https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz
          tar -Jxf toolchain.tar.xz
          echo "Toolchain ready"

      - name: Clone KPatch-Next (kernel headers)
        run: |
          git clone --depth=1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          echo "Headers ready"

      - name: Build extreme-tweaker.kpm
        run: |
          export TARGET_COMPILE=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-
          export KP_DIR=$PWD/kpatch-next
          cd kpms/extreme-tweaker
          make TARGET_COMPILE="$TARGET_COMPILE" KP_DIR="$KP_DIR"
          echo "--- Output ---"
          ls -lh extreme-tweaker.kpm
          file extreme-tweaker.kpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extreme-tweaker-kpm
          path: kpms/extreme-tweaker/extreme-tweaker.kpm
          if-no-files-found: error

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: kpm-v${{ github.run_number }}
          name: "ExtremeKernel KPM Modules (build ${{ github.run_number }})"
          artifacts: kpms/extreme-tweaker/extreme-tweaker.kpm
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ## extreme-tweaker.kpm

            Performance sysctl tweaker for **Samsung Galaxy S20 Ultra (d2s, Exynos 9825)**.
            Built against KPatch-Next ${{ steps.kpver.outputs.version }}.

            ### What it tweaks (applied on every boot)

            | Setting | Before | After | Effect |
            |---|---|---|---|
            | vm.swappiness | 60 | **10** | Keeps data in RAM, avoids slow swap |
            | vm.dirty_ratio | default | **20** | Sane write-back ceiling |
            | vm.dirty_background_ratio | default | **5** | Earlier background disk flush |
            | tcp_fastopen | 1 | **3** | Faster connections (client + server) |
            | tcp_slow_start_after_idle | 1 | **0** | No speed drop after short idle |
            | tcp_tw_reuse | 0 | **1** | Faster socket recycling |

            ### How to install

            1. Flash **ExtremeKRNL-Nexus-d2s-KPatch** zip via TWRP/OrangeFox
            2. In KernelSU Manager: install **KPatch-Next-Module** from https://github.com/KernelSU-Next/KPatch-Next-Module
            3. Open KPatch-Next-Module WebUI → **KPM** tab → **Load** → pick `extreme-tweaker.kpm`
            4. Reboot — tweaks are live immediately

            > You can reload or unload .kpm files at any time from the WebUI without reflashing.
