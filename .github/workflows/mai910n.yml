name: Update KernelSU-Next Submodule Pointer

on:
  push: 
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Authenticate remote
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}@github.com/${{ github.repository }}

      - name: Sync submodule
        run: git submodule sync --recursive

      - name: Initialize submodule
        run: |
          git submodule update --init --force --recursive KernelSU-Next

      - name: Update KernelSU-Next to latest legacy-susfs
        run: |
          cd KernelSU-Next
          git fetch origin legacy-susfs
          git checkout 4cc162e027cc36f8e4d4e6a554e9aa07cac4d4f0
          cd ..

      - name: Commit and push updated pointer
        run: |
          git add KernelSU-Next
          git commit -m "KernelSU-Next: bump to legacy-susfs 4cc162e (susfs support)" || echo "No changes to commit"
          git push origin HEAD:main
